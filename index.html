<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,"PingFang SC","Noto Sans SC",sans-serif; background: linear-gradient(160deg,#e0f2fe 0%,#f0fdf4 50%,#fef9ee 100%); min-height: 100vh; padding: 16px; padding-bottom: 40px; }
.header { background: linear-gradient(135deg,#1a6fb5,#8b5cf6); border-radius: 20px; padding: 24px 18px; color: white; margin-bottom: 20px; text-align: center; }

.section-label { font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 10px; letter-spacing: 0.5px; }
.card { display: block; background: white; border-radius: 18px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); text-decoration: none; border-left: 5px solid #e2e8f0; }
.card.blue { border-left-color: #2563eb; }
.card.purple { border-left-color: #7c3aed; }
.card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.card-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.card-icon.blue { background: #eff6ff; }
.card-icon.purple { background: #f5f3ff; }
.card-title { font-size: 0.95rem; font-weight: 800; color: #1a1a2e; margin-bottom: 2px; }
.card-subtitle { font-size: 0.68rem; color: #64748b; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.tag { font-size: 0.65rem; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
.tag.blue { background: #eff6ff; color: #2563eb; }
.tag.purple { background: #f5f3ff; color: #7c3aed; }
.tag.gray { background: #f1f5f9; color: #64748b; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-count { font-size: 0.72rem; color: #94a3b8; }
.card.blue .card-arrow { color: #2563eb; font-size: 1rem; }
.card.purple .card-arrow { color: #7c3aed; font-size: 1rem; }
.divider { height: 1px; background: #e2e8f0; margin: 16px 0; }
.tip { background: white; border-radius: 14px; padding: 13px 15px; box-shadow: 0 2px 12px rgba(0,0,0,.06); display: flex; align-items: flex-start; gap: 10px; }
.tip-title { font-size: 0.78rem; font-weight: 700; color: #1a1a2e; margin-bottom: 3px; }
.tip-text { font-size: 0.7rem; color: #64748b; line-height: 1.5; }
